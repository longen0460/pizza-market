{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px;">
    <h2>🔐 Новый пароль</h2>
    <p style="margin: 15px 0;">Придумайте новый пароль для вашей учетной записи.</p>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="new_password1">Новый пароль</label>
            <input type="password" name="new_password1" id="new_password1" required class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        </div>
        
        <div class="form-group">
            <label for="new_password2">Подтверждение пароля</label>
            <input type="password" name="new_password2" id="new_password2" required class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">✅ Сменить пароль</button>
    </form>
</div>
{% endblock %}
