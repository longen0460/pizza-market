{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px;">
    <h2>🔐 Восстановление пароля</h2>
    <p style="margin: 15px 0; color: #666;">Забыли пароль? Введите свой email, и мы отправим инструкцию для восстановления.</p>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">📧 Отправить инструкцию</button>
    </form>
    
    <p style="margin-top: 20px; text-align: center;">
        <a href="/users/login/">Вернуться ко входу</a>
    </p>
</div>
{% endblock %}
